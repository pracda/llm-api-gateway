# NOTE: the ${VAR} interpolation used below (for POSTGRES_PASSWORD, REDIS_PASSWORD,
# SPRING_DATASOURCE_* etc.) is resolved by Compose itself from a .env file — and
# Compose does NOT reliably auto-discover ../.env when invoked as
# `docker compose -f docker/docker-compose.yml ...` from the parent directory.
# Always pass --env-file explicitly, e.g.:
#   docker compose --env-file ../.env -f docker/docker-compose.yml up -d --build
# (run from inside docker/), or the equivalent absolute path from anywhere else.
# Without it, these silently fall back to their insecure `:-default` values, or
# to an empty string where no default is given (JWT_SECRET) — an empty JWT
# signing key fails loudly at boot (WeakKeyException), which is how this was
# first caught.
version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gateway-postgres
    env_file: ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmgateway}
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application (full stack only) ────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gateway-app
    env_file: ../.env
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-llmgateway}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-gateway}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-gateway_secret}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      SPRING_PROFILES_ACTIVE: prod
      # OPENAI_API_KEY / ANTHROPIC_API_KEY / JWT_SECRET / ADMIN_PASSWORD / CANARY_TOKEN
      # are plain passthroughs with the same name in .env as the container expects,
      # so env_file alone supplies them correctly — no ${VAR} interpolation needed
      # (and thus immune to the --env-file gotcha noted above).
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
