name: CI / CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: llm-api-gateway

jobs:

  # ── 1. Build & test ─────────────────────────────────────────────────────
  test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn verify -Dspring.profiles.active=test
        env:
          OPENAI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          JWT_SECRET: ci-test-secret-key-min-32-chars-long-enough

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload coverage (future)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-jar
          path: target/*.jar

  # ── 2. Code quality ─────────────────────────────────────────────────────
  quality:
    name: Code quality check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Check for secrets in code
        run: |
          # Fail if any hardcoded API key patterns are found
          if grep -rE "(sk-[a-zA-Z0-9]{48}|sk-ant-[a-zA-Z0-9])" src/; then
            echo "ERROR: Hardcoded API key detected!"
            exit 1
          fi
          echo "No hardcoded secrets found"

  # ── 3. Docker build (main branch only) ──────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [ test, quality ]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          echo "Image built: ${{ env.IMAGE_NAME }}:${{ github.sha }}"

      # ── Uncomment when AWS ECR is configured ──────────────────────────
