# ── Default (local dev) ──────────────────────────────────────────────────────
spring:
  application:
    name: llm-api-gateway

  datasource:
    url: jdbc:postgresql://localhost:5432/llmgateway
    username: gateway
    password: gateway_secret
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # Flyway now owns schema creation/migration (see db/migration) — Hibernate
      # only validates the entities match what Flyway created.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    baseline-on-migrate: true
    baseline-version: 1

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_secret

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# ── App-specific config ────────────────────────────────────────────────────
app:
  admin:
    default-password: ${ADMIN_PASSWORD:admin123}

  jwt:
    secret: ${JWT_SECRET:local-dev-secret-at-least-32-characters-long}
    expiration-ms: 86400000        # 24 hours

  llm:
    openai:
      api-key: ${OPENAI_API_KEY:}
      default-model: gpt-4o-mini
      # Inter-signal timeout for streaming calls (resets on every token/element, not a
      # single total-duration cap) — 120s tolerates slower analyses than the old 30s default.
      timeout-seconds: 120
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: https://api.anthropic.com
      api-version: "2023-06-01"
      default-model: claude-3-haiku-20240307
      timeout-seconds: 120

  rate-limit:
    requests-per-minute: 20
    requests-per-day: 500
    global-requests-per-minute: 200

  api-keys:
    tiers:
      trial:
        requests-per-day: 100
        max-tokens-per-request: 1000
        expiry-days: 7
      standard:
        requests-per-day: 2000
        max-tokens-per-request: 4000
        expiry-days: 90

  security:
    input:
      injection-detection-enabled: true
      block-on-detection: true          # false = log only (for testing)
      pii-action: REDACT                # REDACT or BLOCK
    output:
      sanitisation-enabled: true
      block-on-unsafe-output: true      # false = log and strip only
      max-response-length: 10000        # chars — responses above this are truncated
    canary-token: ${CANARY_TOKEN:}      # blank = a random one is generated at boot
    competitor-keywords: "ChatGPT,Google Gemini,Microsoft Copilot"
    # Slack-compatible incoming webhook for HIGH-severity alerts — blank disables it.
    alert-webhook-url: ${ALERT_WEBHOOK_URL:}

    threat-detection:
      window-seconds: 300
      lockout-seconds: 900
      injection-attempts-threshold: 3
      output-block-threshold: 5
      rate-limit-abuse-threshold: 5
      failed-login-threshold: 5
      distinct-ip-threshold: 3
      coordinated-attack-user-threshold: 3
      # Sustained-success-volume proxy for model-extraction/distillation abuse (OWASP LLM10) —
      # see ThreatDetectionService.recordSuccess for why this is distinct from rate-limit-abuse.
      extraction-suspicion-window-seconds: 300
      extraction-suspicion-threshold: 100

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Swagger UI ────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    com.prasiddha.gateway: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

---
# ── Production profile ─────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}

logging:
  level:
    com.prasiddha.gateway: INFO
    org.springframework.security: WARN
