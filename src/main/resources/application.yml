# ── Default (local dev) ──────────────────────────────────────────────────────
spring:
  application:
    name: llm-api-gateway

  datasource:
    url: jdbc:postgresql://localhost:5432/llmgateway
    username: gateway
    password: gateway_secret
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      # Flyway now owns schema creation/migration (see db/migration) — Hibernate
      # only validates the entities match what Flyway created.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Pin JDBC timestamp read/write to UTC — without this, Instant columns
        # (e.g. AuditLog.createdAt) round-trip through the JVM's default
        # timezone, which can shift day-bucketed queries near UTC midnight
        # on any host not itself set to UTC.
        jdbc:
          time_zone: UTC

  flyway:
    baseline-on-migrate: true
    baseline-version: 1

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_secret

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# ── App-specific config ────────────────────────────────────────────────────
app:
  admin:
    default-password: ${ADMIN_PASSWORD:admin123}

  jwt:
    secret: ${JWT_SECRET:local-dev-secret-at-least-32-characters-long}
    expiration-ms: 86400000        # 24 hours

  llm:
    # Provider registry (F3a) — adding a backend is config-only. `type: openai-compatible`
    # covers OpenAI itself plus any OpenAI-format backend (Groq, OpenRouter, Together,
    # Ollama, …); `type: anthropic` uses the dedicated Anthropic Messages provider.
    # `timeout-seconds` is an inter-signal timeout for streaming (resets on every element,
    # not a total-duration cap) — 120s tolerates slower analyses than the old 30s default.
    providers:
      openai:
        type: openai-compatible
        base-url: https://api.openai.com
        api-key: ${OPENAI_API_KEY:}
        default-model: gpt-4o-mini
        allowed-models: [gpt-4o-mini, gpt-4o, gpt-4-turbo, gpt-3.5-turbo]
        timeout-seconds: 120
      anthropic:
        type: anthropic
        base-url: https://api.anthropic.com
        api-version: "2023-06-01"
        api-key: ${ANTHROPIC_API_KEY:}
        # claude-3-haiku-20240307 (and its 2024-generation siblings) are retired and now
        # return 404 from the Anthropic API — replaced with the current model lineup.
        default-model: claude-haiku-4-5-20251001
        allowed-models: [claude-haiku-4-5-20251001, claude-sonnet-5, claude-opus-4-8]
        timeout-seconds: 120
      # ── Free ($0) providers for graceful degradation (F6) ──
      # Disabled by default so the gateway boots without extra credentials/infra. Uncomment a
      # block (and set its key / stand up Ollama) to enable free-tier degradation, then add the
      # provider to app.llm.fallback.chain below. Mark them `free: true` and give $0 pricing.
      # groq:
      #   type: openai-compatible
      #   base-url: https://api.groq.com/openai
      #   api-key: ${GROQ_API_KEY:}
      #   default-model: llama-3.1-8b-instant
      #   allowed-models: [llama-3.1-8b-instant, llama-3.3-70b-versatile]
      #   free: true
      # ollama:
      #   type: openai-compatible
      #   base-url: http://localhost:11434       # no api-key needed for a local Ollama
      #   default-model: llama3.1
      #   allowed-models: [llama3.1]
      #   free: true
    retry:
      max-retries: 2
      backoff-ms: 500
      fallback-enabled: true   # master switch for cross-provider laddering (F3a/F6)
    # ── Smart routing (F3b) — engaged only on requests sending "model": "auto" ──
    routing:
      enabled: true
      simple:  { provider: openai,    model: gpt-4o-mini }      # cheap default for simple traffic
      complex: { provider: anthropic, model: claude-sonnet-5 }  # premium for long/suspicious traffic
      complexity-char-threshold: 600      # prompts >= this many chars route to `complex`
      suspicious-score-threshold: 40      # jailbreak score >= this also routes to `complex`
      premium-tiers: [STANDARD, ENTERPRISE]   # TRIAL is capped to `simple`
      budget-floor-fraction: 0.15         # when <15% of the daily cap remains, force `simple`
    # ── Shared embeddings source (F1 semantic detection; later F2 semantic cache) ──
    # Any OpenAI-compatible /v1/embeddings endpoint. Point base-url at a local Ollama
    # (http://localhost:11434, model nomic-embed-text) for a self-contained $0 setup.
    embeddings:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:}
      model: text-embedding-3-small
      timeout-seconds: 10
    # ── Free-LLM graceful degradation (F6) ──
    fallback:
      # Ordered fallback ladder. Empty = provider-registry declaration order. Put paid providers
      # first and free ones last, e.g. [openai, anthropic, groq, ollama].
      chain: []
      # What to do when a caller's daily budget is exhausted: HARD_BLOCK (return 402, current
      # behaviour) or DEGRADE_TO_FREE (serve a free provider at $0, flagged degraded).
      on-budget-exhausted: HARD_BLOCK
      # Optional per-tier override, e.g. let demo/trial keys degrade while paid tiers hard-block:
      # budget-policy-by-tier:
      #   TRIAL: DEGRADE_TO_FREE
      #   STANDARD: HARD_BLOCK
    pricing:
      openai:
        gpt-4o-mini: { input-per-million: 0.15, output-per-million: 0.60 }
        gpt-4o: { input-per-million: 2.50, output-per-million: 10.00 }
        gpt-4-turbo: { input-per-million: 10.00, output-per-million: 30.00 }
        gpt-3.5-turbo: { input-per-million: 0.50, output-per-million: 1.50 }
      anthropic:
        claude-haiku-4-5-20251001: { input-per-million: 0.25, output-per-million: 1.25 }
        claude-sonnet-5: { input-per-million: 3.00, output-per-million: 15.00 }
        claude-opus-4-8: { input-per-million: 15.00, output-per-million: 75.00 }

  rate-limit:
    requests-per-minute: 20
    requests-per-day: 500
    global-requests-per-minute: 200
    auth-requests-per-minute: 10   # per-IP, pre-auth (register/login)

  api-keys:
    tiers:
      trial:
        requests-per-day: 100
        max-tokens-per-request: 1000
        expiry-days: 7
        daily-budget-usd: 1.00
      standard:
        requests-per-day: 2000
        max-tokens-per-request: 4000
        expiry-days: 90
        daily-budget-usd: 25.00

  # ── Response caching (F2) — identical/near-identical prompts return at $0 ──
  # Both layers OFF by default (enabling changes nothing until you opt in). The semantic layer
  # additionally needs a Postgres image with the `vector` extension (e.g. pgvector/pgvector:pg16);
  # it self-disables if unavailable, so turning it on can never break boot.
  cache:
    enabled: false            # exact-match (Redis) layer
    semantic-enabled: false   # semantic (pgvector) layer — requires the vector extension
    similarity-threshold: 0.93
    ttl-seconds: 3600
    scope: ORG                # ORG | KEY | GLOBAL (never share across orgs unless GLOBAL)
    max-entries-per-scope: 1000
    embedding-dim: 1536       # must match app.llm.embeddings.model (text-embedding-3-small = 1536)

  security:
    input:
      injection-detection-enabled: true
      block-on-detection: true          # false = log only (for testing)
      pii-action: REDACT                # REDACT or BLOCK
      # ── Semantic injection detection (F1) — catches paraphrased jailbreaks regex misses ──
      # Fail-open and content-free. Needs app.llm.embeddings configured (below). Runs only on
      # regex-clean, non-trivial prompts, so the embedding cost is paid on a minority of traffic.
      semantic:
        enabled: true
        similarity-threshold: 0.82      # cosine >= this → treated as a jailbreak match (block)
        similarity-floor: 0.60          # below this contributes 0 to the score
        weight: 60                      # max points the semantic pass can add
        gray-zone-max: 59               # skip semantic if regex already scored this high
        min-prompt-chars: 20            # skip trivially short prompts
        corpus-resource: classpath:jailbreak-corpus.txt
    output:
      sanitisation-enabled: true
      block-on-unsafe-output: true      # false = log and strip only
      max-response-length: 10000        # chars — responses above this are truncated
      # F4: abort a stream the moment a canary token or secret appears (across chunk boundaries),
      # instead of only alerting after full delivery. Already-sent tokens can't be recalled, so
      # this shrinks a leak rather than eliminating the first-N-token exposure.
      stream-leak-abort: true
    canary-token: ${CANARY_TOKEN:}      # blank = a random one is generated at boot
    competitor-keywords: "ChatGPT,Google Gemini,Microsoft Copilot"
    # Slack-compatible incoming webhook for HIGH-severity alerts — blank disables it.
    alert-webhook-url: ${ALERT_WEBHOOK_URL:}

    threat-detection:
      window-seconds: 300
      lockout-seconds: 900
      injection-attempts-threshold: 3
      output-block-threshold: 5
      rate-limit-abuse-threshold: 5
      failed-login-threshold: 5
      distinct-ip-threshold: 3
      coordinated-attack-user-threshold: 3
      # Sustained-success-volume proxy for model-extraction/distillation abuse (OWASP LLM10) —
      # see ThreatDetectionService.recordSuccess for why this is distinct from rate-limit-abuse.
      extraction-suspicion-window-seconds: 300
      extraction-suspicion-threshold: 100

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Swagger UI ────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    com.prasiddha.gateway: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"

---
# ── Production profile ─────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}

logging:
  level:
    com.prasiddha.gateway: INFO
    org.springframework.security: WARN
